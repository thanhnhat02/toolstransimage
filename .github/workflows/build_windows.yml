name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install PyTorch and Dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        # Install CPU version of PyTorch for building/lightweight run (reduces bundle size significantly)
        # Users can still run it with GPU if they install CUDA toolkit and the app detects it,
        # but PyInstaller packing the full CUDA PyTorch creates a 3GB+ EXE.
        # We will package with standard PyTorch.
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Clean previous builds
      run: |
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        if (Test-Path dist) { Remove-Item -Recurse -Force dist }

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller ai_enhancer.spec

    - name: Zip Release
      run: |
        Compress-Archive -Path dist/AIImageEnhancer -DestinationPath AIImageEnhancer_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AIImageEnhancer_Windows
        path: AIImageEnhancer_Windows.zip
        retention-days: 7
